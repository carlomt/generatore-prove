name: Docker Multiarch Image CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  docker_build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    outputs:
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"

          if [[ -f VERSION ]]; then
            VERSION="$(cat VERSION)"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::12}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
            ${{ steps.meta.outputs.image }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  docker_manifest:
    name: Create multiarch manifest
    needs: docker_build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push Docker manifest for versioned tag
        run: |
          docker buildx imagetools create \
            -t ${{ needs.docker_build.outputs.image }}:${{ needs.docker_build.outputs.version }} \
            ${{ needs.docker_build.outputs.image }}:${{ needs.docker_build.outputs.version }}-amd64 \
            ${{ needs.docker_build.outputs.image }}:${{ needs.docker_build.outputs.version }}-arm64

      - name: Create and push Docker manifest for latest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker buildx imagetools create \
            -t ${{ needs.docker_build.outputs.image }}:latest \
            ${{ needs.docker_build.outputs.image }}:latest-amd64 \
            ${{ needs.docker_build.outputs.image }}:latest-arm64
